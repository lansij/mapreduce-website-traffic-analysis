server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/traffic_analysis?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# Hadoop 配置（本地模式）
hadoop:
  fs-default: file:///
  data-input: data/access_log.csv
  data-output: data/output
